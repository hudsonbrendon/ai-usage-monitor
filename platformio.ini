; ── ideaspark ESP8266 0.96" OLED (the only board today) ───────────────────────
; Flag convention so new boards drop in cleanly:
;   -DBOARD_<NAME>        selects exactly one board file (boards/<name>.cpp)
;   -DUSE_MONO_CANVAS     compiles MonoCanvas (U8g2). Future: USE_TFT_CANVAS, etc.
[env:ideaspark]
platform = espressif8266@^4.2.1
board = esp12e
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = littlefs
build_flags =
    -DBOARD_IDEASPARK
    -DUSE_MONO_CANVAS
    -DPIO_FRAMEWORK_ARDUINO_MMU_CACHE16_IRAM48_SECHEAP_SHARED
lib_deps =
    olikraus/U8g2@^2.36.5
    bblanchon/ArduinoJson@^7.0.0

; ── Host unit tests for the Arduino-independent logic ─────────────────────────
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
build_src_filter = +<Settings.cpp> +<Usage.cpp>
test_build_src = yes
